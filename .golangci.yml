version: "2"

run:
  timeout: 5m
  tests: false

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - ineffassign
    - unused
    - misspell
    - gocritic
    - wrapcheck
  settings:
    govet:
      enable:
        - shadow
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
        - .Error(
      ignore-package-globs:
        - github.com/onurceri/botla-app/*
        - github.com/stretchr/testify/*
        - context
  exclusions:
    paths:
      - ^frontend/
      - ^widget/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
