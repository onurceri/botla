services:
  postgres:
    image: postgres:16-alpine
    container_name: botla-postgres
    environment:
      - POSTGRES_USER=botla
      - POSTGRES_PASSWORD=botla
      - POSTGRES_DB=botla_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    container_name: botla-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  migrator:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    command: ["-path=/migrations", "-database=postgres://botla:botla@postgres:5432/botla_dev?sslmode=disable", "up"]
    restart: on-failure
  qdrant:
    image: qdrant/qdrant:latest
    container_name: botla-qdrant
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY}
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  qdrant_snapshots:
