name: Go CI
on:
  push:
    branches:
      - main
      - master
  pull_request:
jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Go Vet
        run: go vet ./...
      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: ./...
      - name: Tests
        run: make test-no-pdf
      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
