<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Botla Widget Preview</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #chatbot-widget-host {
      position: absolute;
      inset: 0;
    }
  </style>
</head>

<body>
  <div id="chatbot-widget-host"></div>

  <script>
    (function () {
      'use strict';

      // Allowed origins for postMessage (production + development)
      var ALLOWED_ORIGINS = [
        'https://botla.app',
        'https://www.botla.app',
        'http://localhost:5173',
        'http://localhost:3000'
      ];

      // Set skip-auto-mount flag - widget should wait for WIDGET_CONFIG message
      window.__CBW_PARAMS = { 'skip-auto-mount': '1' };

      function isAllowedOrigin(origin) {
        // Allow same-origin
        if (origin === window.location.origin) return true;
        // Check against whitelist
        return ALLOWED_ORIGINS.indexOf(origin) !== -1;
      }

      // Track whether widget has been mounted
      var widgetMounted = false;

      window.addEventListener('message', function (event) {
        // Security: Validate origin
        if (!isAllowedOrigin(event.origin)) {
          console.warn('Widget preview: Rejected message from unauthorized origin:', event.origin);
          return;
        }

        if (!event.data || event.data.type !== 'WIDGET_CONFIG') return;

        var config = event.data.config || {};

        // Force preview-specific settings
        config['position-strategy'] = 'absolute';
        config['use-url-overrides'] = '1';
        config['preview-mode'] = '1';

        // Only reset session on first mount, not on config updates
        if (!widgetMounted) {
          config['reset-session'] = '1';
        }

        window.__CBW_PARAMS = config;

        // Mount widget only on first config, then let widget.tsx handle updates via postMessage
        if (window.ChatbotWidget && !widgetMounted) {
          try {
            window.ChatbotWidget.mount();
            widgetMounted = true;
          } catch (e) {
            console.error('Widget mount error:', e);
          }
        }
        // For subsequent updates, the widget.tsx message listener handles updates internally

        // Acknowledge to parent (use specific origin, not *)
        if (event.source) {
          event.source.postMessage({ type: 'WIDGET_CONFIG_APPLIED' }, event.origin);
        }
      });
    })();
  </script>

  <script type="module" src="/src/widget.tsx"></script>
</body>

</html>
