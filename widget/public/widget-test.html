<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Widget E2E Test Page</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .test-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .test-content {
      text-align: center;
      color: white;
      max-width: 600px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .test-info {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .test-info code {
      background: rgba(0, 0, 0, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    /* Ensure widget button is visible */
    #chatbot-widget-host {
      position: fixed;
      bottom: 0;
      right: 0;
      z-index: 2147483647;
    }
  </style>
</head>

<body>
  <div class="test-container">
    <div class="test-content">
      <h1>🤖 Widget E2E Test Page</h1>
      <p>
        This page is used for end-to-end testing of the Botla chat widget.
        Look for the chat bubble in the bottom-right corner.
      </p>
      <div class="test-info">
        <p>Test chatbot ID: <code>test-chatbot</code></p>
        <p>Click the chat bubble to open the widget.</p>
      </div>
    </div>
  </div>

  <div id="chatbot-widget-host"></div>

  <!-- Widget script with test chatbot configuration -->
  <script type="module">
    // Set widget params for testing
    window.__CBW_PARAMS = {
      'chatbot-id': 'test-chatbot',
      'api-base': '',
      'auto-open': '0',
      'color': '#6366f1',
      'welcome': 'Merhaba! Size nasıl yardımcı olabilirim?',
      'bot-name': 'Test Bot'
    };
  </script>
  <script type="module" src="/src/widget.tsx"></script>
</body>

</html>
